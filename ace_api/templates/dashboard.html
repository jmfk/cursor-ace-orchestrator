<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Performance Profiler Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card { @apply bg-white p-6 rounded-lg shadow-md; }
        .stat-value { @apply text-2xl font-bold text-indigo-600; }
        .stat-label { @apply text-sm text-gray-500 uppercase tracking-wider; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <span class="mr-2">🚀</span> ACE Profiler Dashboard
            </h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-indigo-200">API Docs</a>
                <button onclick="window.location.reload()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded transition">Refresh</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="card">
                <div class="stat-label">Total Calls</div>
                <div class="stat-value" id="total-calls">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Avg Duration</div>
                <div class="stat-value" id="avg-duration">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Max Duration</div>
                <div class="stat-value" id="max-duration">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Slowest Function</div>
                <div class="stat-value text-sm truncate" id="slowest-func">-</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Duration Chart -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Function Durations (Last 50)</h2>
                <canvas id="durationChart" height="200"></canvas>
            </div>
            <!-- Function Distribution -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Call Frequency by Function</h2>
                <canvas id="freqChart" height="200"></canvas>
            </div>
        </div>

        <!-- Recent Logs Table -->
        <div class="card overflow-x-auto">
            <h2 class="text-lg font-semibold mb-4">Recent Profiling Logs</h2>
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Timestamp</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Function</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duration (s)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Args</th>
                    </tr>
                </thead>
                <tbody id="log-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchData() {
            const response = await fetch('/profiler/data');
            const data = await response.json();
            updateDashboard(data);
        }

        function updateDashboard(logs) {
            if (!logs || logs.length === 0) return;

            // Stats
            const durations = logs.map(l => l.duration_seconds);
            const total = logs.length;
            const avg = durations.reduce((a, b) => a + b, 0) / total;
            const max = Math.max(...durations);
            
            const funcCounts = {};
            const funcDurations = {};
            logs.forEach(l => {
                funcCounts[l.function] = (funcCounts[l.function] || 0) + 1;
                funcDurations[l.function] = Math.max(funcDurations[l.function] || 0, l.duration_seconds);
            });

            const slowestFunc = Object.entries(funcDurations).sort((a, b) => b[1] - a[1])[0][0];

            document.getElementById('total-calls').textContent = total;
            document.getElementById('avg-duration').textContent = avg.toFixed(4) + 's';
            document.getElementById('max-duration').textContent = max.toFixed(4) + 's';
            document.getElementById('slowest-func').textContent = slowestFunc;

            // Table
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';
            logs.slice(-10).reverse().forEach(log => {
                const row = `<tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(log.timestamp).toLocaleString()}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${log.function}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.duration_seconds.toFixed(4)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.args_count} args, ${log.kwargs_keys.join(', ')}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            // Charts
            renderCharts(logs, funcCounts);
        }

        let durationChart, freqChart;

        function renderCharts(logs, funcCounts) {
            const ctx1 = document.getElementById('durationChart').getContext('2d');
            const last50 = logs.slice(-50);
            
            if (durationChart) durationChart.destroy();
            durationChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: last50.map((_, i) => i),
                    datasets: [{
                        label: 'Duration (s)',
                        data: last50.map(l => l.duration_seconds),
                        borderColor: 'rgb(79, 70, 229)',
                        tension: 0.1,
                        fill: true,
                        backgroundColor: 'rgba(79, 70, 229, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });

            const ctx2 = document.getElementById('freqChart').getContext('2d');
            if (freqChart) freqChart.destroy();
            freqChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(funcCounts),
                    datasets: [{
                        data: Object.values(funcCounts),
                        backgroundColor: [
                            '#4F46E5', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'
                        ]
                    }]
                },
                options: { responsive: true }
            });
        }

        fetchData();
        setInterval(fetchData, 5000); // Auto-refresh every 5s
    </script>
</body>
</html>
