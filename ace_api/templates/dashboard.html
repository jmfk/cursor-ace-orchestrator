<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Performance Profiler Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card { @apply bg-white p-6 rounded-lg shadow-md; }
        .stat-value { @apply text-2xl font-bold text-indigo-600; }
        .stat-label { @apply text-sm text-gray-500 uppercase tracking-wider; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <span class="mr-2">🚀</span> ACE Profiler Dashboard
            </h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-indigo-200">API Docs</a>
                <button onclick="window.location.reload()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded transition">Refresh</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="card">
                <div class="stat-label">Total Calls</div>
                <div class="stat-value" id="total-calls">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Avg Duration</div>
                <div class="stat-value" id="avg-duration">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Max Duration</div>
                <div class="stat-value" id="max-duration">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Slowest Function</div>
                <div class="stat-value text-sm truncate" id="slowest-func">-</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Duration Chart -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Function Durations (Last 50)</h2>
                <canvas id="durationChart" height="200"></canvas>
            </div>
            <!-- Function Distribution -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Call Frequency by Function</h2>
                <canvas id="freqChart" height="200"></canvas>
            </div>
        </div>

        <!-- Recent Logs Table -->
        <div class="card overflow-x-auto mb-8">
            <h2 class="text-lg font-semibold mb-4">Recent Profiling Logs</h2>
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Timestamp</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Function</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duration (s)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Args</th>
                    </tr>
                </thead>
                <tbody id="log-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>

        <!-- Marketplace Section -->
        <div class="card">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-bold text-gray-800">ACE Plugin Marketplace</h2>
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    <div class="relative flex-grow md:flex-grow-0">
                        <input type="text" id="search-query" oninput="fetchData()" placeholder="Search plugins..." class="w-full md:w-64 pl-8 pr-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <span class="absolute left-2.5 top-2.5 text-gray-400">🔍</span>
                    </div>
                    <select id="filter-type" onchange="fetchData()" class="bg-white border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">All Types</option>
                        <option value="sop">SOPs</option>
                        <option value="agent">Agents</option>
                        <option value="mdc">MDC Templates</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="plugin-list">
                <!-- Plugins will be injected here -->
                <div class="text-gray-500 italic col-span-full text-center py-8">Loading marketplace plugins...</div>
            </div>
        </div>
    </main>

    <script>
        async function fetchData() {
            const profilerResponse = await fetch('/profiler/data');
            const profilerData = await profilerResponse.json();
            updateDashboard(profilerData);

            const type = document.getElementById('filter-type')?.value || '';
            const query = document.getElementById('search-query')?.value || '';
            const url = `/marketplace/plugins?${type ? 'type=' + type + '&' : ''}${query ? 'query=' + query : ''}`;
            const marketplaceResponse = await fetch(url);
            const marketplaceData = await marketplaceResponse.json();
            updateMarketplace(marketplaceData);
        }

        function updateMarketplace(plugins) {
            const pluginList = document.getElementById('plugin-list');
            if (!plugins || plugins.length === 0) {
                pluginList.innerHTML = '<div class="text-gray-500 italic col-span-full text-center py-8">No plugins available in the marketplace yet.</div>';
                return;
            }

            pluginList.innerHTML = '';
            plugins.forEach(plugin => {
                const card = `
                    <div class="border rounded-lg p-4 hover:shadow-lg transition bg-gray-50 flex flex-col h-full">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-indigo-700 truncate mr-2" title="${plugin.name}">${plugin.name}</h3>
                            <span class="text-[10px] font-semibold px-2 py-0.5 bg-indigo-100 text-indigo-800 rounded uppercase whitespace-nowrap">${plugin.type}</span>
                        </div>
                        <p class="text-sm text-gray-600 mb-4 flex-grow line-clamp-3">${plugin.description}</p>
                        <div class="flex justify-between items-center text-[10px] text-gray-500 mb-3">
                            <span class="truncate mr-2">By ${plugin.author}</span>
                            <span class="whitespace-nowrap">v${plugin.version}</span>
                        </div>
                        <div class="flex flex-wrap gap-1 mb-4">
                            ${(plugin.tags || []).slice(0, 3).map(tag => `<span class="bg-gray-200 text-gray-700 px-1.5 py-0.5 rounded text-[10px]">#${tag}</span>`).join('')}
                        </div>
                        <div class="mt-auto pt-4 border-t flex justify-between items-center">
                            <div class="flex items-center text-xs text-gray-600">
                                <span class="mr-3" title="Downloads">📥 ${plugin.downloads}</span>
                                <span title="Rating">⭐ ${plugin.rating.toFixed(1)}</span>
                            </div>
                            <button onclick="downloadPlugin('${plugin.id}')" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded font-medium transition shadow-sm">Download</button>
                        </div>
                    </div>
                `;
                pluginList.innerHTML += card;
            });
        }

        async function downloadPlugin(pluginId) {
            try {
                const response = await fetch(`/marketplace/plugins/${pluginId}/download`, { method: 'POST' });
                if (response.ok) {
                    alert('Plugin download initiated!');
                    fetchData(); // Refresh to update download count
                } else {
                    alert('Failed to download plugin.');
                }
            } catch (error) {
                console.error('Error downloading plugin:', error);
            }
        }

        function updateDashboard(logs) {
            if (!logs || logs.length === 0) return;

            // Stats
            const durations = logs.map(l => l.duration_seconds);
            const total = logs.length;
            const avg = durations.reduce((a, b) => a + b, 0) / total;
            const max = Math.max(...durations);
            
            const funcCounts = {};
            const funcDurations = {};
            logs.forEach(l => {
                funcCounts[l.function] = (funcCounts[l.function] || 0) + 1;
                funcDurations[l.function] = Math.max(funcDurations[l.function] || 0, l.duration_seconds);
            });

            const slowestFunc = Object.entries(funcDurations).sort((a, b) => b[1] - a[1])[0][0];

            document.getElementById('total-calls').textContent = total;
            document.getElementById('avg-duration').textContent = avg.toFixed(4) + 's';
            document.getElementById('max-duration').textContent = max.toFixed(4) + 's';
            document.getElementById('slowest-func').textContent = slowestFunc;

            // Table
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';
            logs.slice(-10).reverse().forEach(log => {
                const row = `<tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(log.timestamp).toLocaleString()}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${log.function}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.duration_seconds.toFixed(4)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.args_count} args, ${log.kwargs_keys.join(', ')}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            // Charts
            renderCharts(logs, funcCounts);
        }

        let durationChart, freqChart;

        function renderCharts(logs, funcCounts) {
            const ctx1 = document.getElementById('durationChart').getContext('2d');
            const last50 = logs.slice(-50);
            
            if (durationChart) durationChart.destroy();
            durationChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: last50.map((_, i) => i),
                    datasets: [{
                        label: 'Duration (s)',
                        data: last50.map(l => l.duration_seconds),
                        borderColor: 'rgb(79, 70, 229)',
                        tension: 0.1,
                        fill: true,
                        backgroundColor: 'rgba(79, 70, 229, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });

            const ctx2 = document.getElementById('freqChart').getContext('2d');
            if (freqChart) freqChart.destroy();
            freqChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(funcCounts),
                    datasets: [{
                        data: Object.values(funcCounts),
                        backgroundColor: [
                            '#4F46E5', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'
                        ]
                    }]
                },
                options: { responsive: true }
            });
        }

        fetchData();
        setInterval(fetchData, 5000); // Auto-refresh every 5s
    </script>
</body>
</html>
